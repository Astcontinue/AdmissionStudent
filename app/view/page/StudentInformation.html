<script type="text/html" id="app-template">

{% block vueScript %}

{% include 'common/jianghuJs/fixedTableHeightV4.html' %}
<script type="module">
  new Vue({
    el: '#app',
    template: '#app-template',
    vuetify: new Vuetify(),
    data: () => ({
      // 面包屑
      breadcrumbs: [
        {
          text: '首页',
          disabled: true,
        },
        {
          text: 'StudentInformation（Not admitted）',
          disabled: true,
        }
      ],
      isHelpPageDrawerShown: false,
      isHelpPageDrawerLoaded: false,
      isMobile: window.innerWidth < 500,
      // 表格相关数据
      isTableZebraLineShown: true,
      validationRules: {
        requireRules: [
          v => !!v || 'This is required',
        ],
      },

      //性别选择
      genderOptions: ['男', '女'],

      serverSearchInput: {
        gender: null,
        level: null, //选中的录入时间(届)
      },
      levels: [], // 录入时间数据

      //日期选择
      years: Array.from({ length: 10 }, (_, i) => new Date().getFullYear() - i).reverse(),
      months: Array.from({ length: 12 }, (_, i) => i + 1),
      days: Array.from({ length: 31 }, (_, i) => i + 1),


      searchInput: null,
      isTableLoading: true,
      selectedItems: [], // 用于保存选中的项
      insertSelecteItems: [],
      tableData: [],
      headers: [
        { text: "ID", value: "id", width: 90 },

        { text: "学生名字", value: "name", width: 120 },
        { text: "性别", value: "gender", width: 120 },
        { text: "出生日期", value: "dateOfBirth", width: 120 },
        { text: "照片", value: "photo", width: 120 },
        { text: "参与时间", value: "level", width: 120 },
        { text: "身份证", value: "idcard", width: 120 },
        { text: "户口", value: "account", width: 120 },
        { text: "主要监护人电话号码", value: "phone_number1", width: 120 },
        { text: "其他号码", value: "phone_number2", width: 120 },
        { text: "家庭住址", value: "address", width: 120 },
        { text: "教育经历", value: "education", width: 120 },
        { text: "备注", value: "remarks", width: 120 },
        { text: "操作者", value: "operationByUser", width: 90 },
        { text: "操作时间", value: "operationAt", width: 150 },
        { text: '操作', value: 'action', align: 'center', sortable: false, width: window.innerWidth < 500 ? 60 : 120, class: 'fixed', cellClass: 'fixed' },
      ],

      isCreateDrawerShown: false,
      createItem: {
        year: null,
        month: null,
        day: null,
      },
      createActionData: {},
      isUpdateDrawerShown: false,
      updateItem: {},
      updateItemId: null,
      updateActionData: {},
      deleteItem: {},
      deleteItemId: null,

    }),

    //身份证和电话号码字数提示与限制
    computed: {
      //身份证
      createIdcardLength() {
        return this.createItem.idcard ? this.createItem.idcard.length : 0;
      },
      updateIdcardLength() {
        return this.updateItem.idcard ? this.updateItem.idcard.length : 0;
      },
      //主要监护人电话号码
      createPhoneNumber1Length() {
        return this.createItem.phone_number1 ? this.createItem.phone_number1.length : 0;
      },
      updatePhoneNumber1Length() {
        return this.updateItem.phone_number1 ? this.updateItem.phone_number1.length : 0;
      },
      //其他号码
      createPhoneNumber2Length() {
        return this.createItem.phone_number2 ? this.createItem.phone_number2.length : 0;
      },
      updatePhoneNumber2Length() {
        return this.updateItem.phone_number2 ? this.updateItem.phone_number2.length : 0;
      },
      //将三个选择器拿到的数据合并插入数据库表中
      createItemDateOfBirth() {
        if (this.createItem.year && this.createItem.month && this.createItem.day) {
          return `${this.createItem.year}-${this.createItem.month.toString().padStart(2, '0')}-${this.createItem.day.toString().padStart(2, '0')}`;
        }
        return null;
      },
    },

    watch: {
      isHelpPageDrawerShown(val) {
        if (val && !this.isHelpPageDrawerLoaded) {
          this.isHelpPageDrawerLoaded = true;
        }
      },
    },
    async created() {
    },
    mounted() {
      this.doUiAction('getTableData');
      //这里generatePastYears()方法的参数为指定可以查询过去多少年的学生
      this.levels = this.generatePastLevels(20);
      this.levels.unshift({ text: '全部', value: null }); // 添加 "全部" 选项
      //回显更改数据表单中的时间数据
      //this.fetchItem();
    },
    methods: {
      async doUiAction(uiActionId, uiActionData) {
        switch (uiActionId) {
          case 'getTableData':
            await this.getTableData();
            break;
          case 'startCreateItem':
            await this.prepareCreateFormData();
            await this.openCreateDrawer();
            break;
          case 'createItem':
            await this.prepareCreateValidate();
            await this.confirmCreateItemDialog();
            await this.prepareDoCreateItem();
            await this.doCreateItem();
            await this.closeCreateDrawer();
            await this.getTableData();
            break;
          case 'startUpdateItem':
            await this.prepareUpdateFormData(uiActionData);
            await this.openUpdateDrawer();
            break;
          case 'updateItem':
            await this.prepareUpdateValidate();
            await this.confirmUpdateItemDialog();
            await this.prepareDoUpdateItem();
            await this.doUpdateItem();
            await this.closeUpdateDrawer();
            await this.getTableData();
            break;
          case 'deleteItem':
            await this.prepareDeleteFormData(uiActionData);
            await this.confirmDeleteItemDialog();
            await this.prepareDoDeleteItem();
            await this.doDeleteItem();
            await this.clearDeleteItem();
            await this.getTableData();
            break;
          case 'insertSelecteItems':
            await this.onSelect(insertSelecteItems);
            this.insertSelectedItems();
            break;
          default:
            console.error("[doUiAction] uiActionId not find", { uiActionId });
            break;
        }
      },
      /**
       * 获取表格数据
       */
      async getTableData() {
        this.isTableLoading = true;
        const backendSearchData = _.pickBy(this.serverSearchInput, (fieldValue, fieldKey) => {
          if (fieldValue !== null && fieldValue !== '') {
            return true;
          }
        });
        const rows = (await window.jianghuAxios({
          data: {
            appData: {
              pageId: 'StudentInformation',
              actionId: 'selectItemList',
              actionData: {},
              where: backendSearchData,
              orderBy: [{ column: 'operationAt', order: 'desc' }]
            }
          }
        })).data.appData.resultData.rows;

        rows.forEach(row => {
          row.operationAt = dayjs(row.operationAt).format('YYYY-MM-DD');
        })

        this.tableData = rows;
        this.isTableLoading = false;
      },
      // ---------- 新增数据 uiAction >>>>>>>>>> --------
      async prepareCreateFormData() {
        this.createItem = {};
      },

      async openCreateDrawer() {
        this.isCreateDrawerShown = true;
      },

      async prepareCreateValidate() {
        if (await this.$refs.createForm.validate()) {
          return true;
        }
        throw new Error("请完善表单信息")
      },

      async confirmCreateItemDialog() {
        if (await window.confirmDialog({ title: "新增", content: "确定新增吗？" }) === false) {
          throw new Error("[confirmCreateFormDialog] 否");
        }
      },

      prepareDoCreateItem() {
        const { id, year, month, day, ...data } = this.createItem;
        //将单独的year、month和day列合并成一个整体
        data.dateOfBirth = `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
        this.createActionData = data;
      },

      async doCreateItem() {
        await window.jhMask.show();
        await window.vtoast.loading("新增数据");
        await window.jianghuAxios({
          data: {
            appData: {
              pageId: 'StudentInformation',
              actionId: 'insertItem',
              actionData: this.createActionData
            }
          }
        })
        await window.jhMask.hide();
        await window.vtoast.success("新增数据成功");
      },
      async closeCreateDrawer() {
        this.isCreateDrawerShown = false;
        this.createItem = {};
        this.createActionData = null;
      },
      // ---------- <<<<<<<<<<< 新增数据 uiAction ---------
      // ---------- 修改数据 uiAction >>>>>>>>>>>> --------
      async prepareUpdateFormData(funObj) {
        this.updateItem = _.cloneDeep(funObj);
      },

      async openUpdateDrawer() {
        this.isUpdateDrawerShown = true;
      },

      async prepareUpdateValidate() {
        if (await this.$refs.updateForm.validate()) {
          return true;
        }
        throw new Error("请完善表单信息")
      },

      async confirmUpdateItemDialog() {
        if (await window.confirmDialog({ title: "修改", content: "确定修改吗？" }) === false) {
          throw new Error("[confirmUpdateItemDialog] 否");
        }
      },

      async prepareDoUpdateItem() {
        const { id, ...data } = this.updateItem;
        this.updateItemId = id;
        this.updateActionData = data;
      },

      async doUpdateItem() {
        await window.jhMask.show();
        await window.vtoast.loading("修改数据");
        await window.jianghuAxios({
          data: {
            appData: {
              pageId: 'StudentInformation',
              actionId: 'updateItem',
              actionData: this.updateActionData,
              where: { id: this.updateItemId }
            }
          }
        })

        await window.jhMask.hide();
        await window.vtoast.success("修改数据成功");
      },

      async closeUpdateDrawer() {
        this.isUpdateDrawerShown = false;
        this.updateItem = {};
        this.updateActionData = null;
        this.updateItemId = null;
      },
      // ---------- <<<<<<<<<<< 修改数据 uiAction ---------
      // ---------- 删除数据 uiAction >>>>>>>>>>>> --------
      async prepareDeleteFormData(funObj) {
        this.deleteItem = _.cloneDeep(funObj);
      },
      async confirmDeleteItemDialog() {
        if (await window.confirmDialog({ title: "删除", content: "确定删除吗？" }) === false) {
          throw new Error("[confirmDeleteItemDialog] 否");
        }
      },
      async prepareDoDeleteItem() {
        const { id } = this.deleteItem;
        this.deleteItemId = id;
      },
      async doDeleteItem() {
        await window.vtoast.loading("删除数据");
        await window.jianghuAxios({
          data: {
            appData: {
              pageId: 'StudentInformation',
              actionId: 'deleteItem',
              actionData: {},
              where: { id: this.deleteItemId }
            }
          }
        });
        await window.vtoast.success("删除数据成功");
      },
      async clearDeleteItem() {
        this.deleteItem = {};
        this.deleteItemId = null;
      },
      // ---------- <<<<<<<<<<< 删除数据 uiAction ---------

      // ---------- <<<<<<<<<<< 根据条件筛选出对应的录入时间（年）和查找完毕返回全部数据 ---------
      generatePastLevels(n) {
        const currentLevel = new Date().getFullYear();
        return Array.from({ length: n }, (_, i) => ({ text: `${currentLevel - i}`, value: currentLevel - i }));
      },
      doQuery() {
        // 保存当前的查询条件
        const currentLevel = this.serverSearchInput.level;

        // 执行查询操作
        this.doUiAction('getTableData');

        // 如果选中的是 "全部"，则恢复查询条件
        if (currentLevel === null) {
          this.serverSearchInput.level = null;
        }
      },
      // ---------- 根据条件筛选出对应的录入时间（年）和查找完毕返回全部数据 >>>>>>>>>>>> --------

      // ---------- <<<<<<<<<<< 批量插入数据 ---------
      onSelect(insertSelecteItems) {
        // 将选中的项保存到一个变量中
        this.selectedItems = insertSelecteItems;
      },
      async insertSelectedItems() {
        for (const item of this.selectedItems) {
          const pkg = {
            packageId: '123456',
            packageType: 'httpRequest',
            appData: {
              appId: `${window.appInfo.appId}`,
              pageId: 'StudentGradeInformation',
              actionId: 'insertItem',
              userAgent: 'demo_userAgent',
              authToken: localStorage.getItem(`${window.appInfo.appId}_authToken`),
              actionData: {
                student_id: item.id,
                name: item.name,
                level: item.level,
              },
              // 如果需要，你可以在这里添加过滤条件
            }
          };
          const result = await axios(pkg);
          const rows = result.data.appData.resultData.rows;
          console.log('rows', rows);
        }
      },
      // ---------- 批量插入数据 >>>>>>>>>>>> --------
    }
  })
</script>
